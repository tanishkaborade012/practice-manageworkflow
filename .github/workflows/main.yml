name: sequential demo

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: step 1
        run: echo "This is job 1"

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: step 2
        run: echo "This is job 2"

  job3:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running tests"

  job4:
    runs-on: ubuntu-latest
    needs: job3
    if: github.ref == 'ref/heads/main'
    steps:
      - run: echo "Deploying to production"
    
  
